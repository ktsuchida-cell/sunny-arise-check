<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1e3a"/>
      <stop offset="0.55" stop-color="#16345c"/>
      <stop offset="1" stop-color="#0e2240"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.86" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#e87f17" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#e87f17" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#e87f17" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1600" height="560" fill="url(#base)"/>
  <rect width="1600" height="560" fill="url(#grid)"/>
  <rect width="1600" height="560" fill="url(#sun)"/>

  <!-- 太陽モチーフ（ロゴの日の出を抽象化・控えめな線画） -->
  <g fill="none" stroke="#f2a85c">
    <circle cx="1378" cy="96" r="56" stroke-opacity="0.30" stroke-width="2"/>
    <circle cx="1378" cy="96" r="96" stroke-opacity="0.16" stroke-width="1.5"/>
    <circle cx="1378" cy="96" r="148" stroke-opacity="0.09" stroke-width="1.5"/>
    <g stroke-opacity="0.22" stroke-width="2" stroke-linecap="round">
      <line x1="1378" y1="176" x2="1378" y2="208"/>
      <line x1="1308" y1="166" x2="1288" y2="192"/>
      <line x1="1448" y1="166" x2="1468" y2="192"/>
      <line x1="1282" y1="120" x2="1252" y2="130"/>
      <line x1="1474" y1="120" x2="1504" y2="130"/>
    </g>
  </g>

  <!-- 地平線のライン -->
  <g fill="none" stroke="#ffffff">
    <path d="M-20 470 Q 400 430 820 452 T 1620 440" stroke-opacity="0.07" stroke-width="2"/>
    <path d="M-20 510 Q 420 470 840 492 T 1620 480" stroke-opacity="0.05" stroke-width="2"/>
  </g>
</svg>
